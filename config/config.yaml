project:
  name: equipment_rental
  base_dir: ./artifacts

sources:
  excel:
    file_path: data/Equipment_Hire_Dataset.xlsx
    sheets:
      - Equipment_Master
      - Customer_Master
      - Rental_Transaction
      - Date_Dimension
  database:
    connection_string: sqlite:///data/equipment_rental.db
    tables:
      - Equipment_Master
      - Customer_Master
      - Rental_Transaction
      - Date_Dimension

pipeline:
  batch_type: full        # full or incremental
  task_name: medallion_pipeline
  schedule: daily
  priority_nbr: 1
  active_flag: true
  insert_user: system