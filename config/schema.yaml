# Schema definitions for Equipment Hire project

Equipment_Master:
  columns:
    - name: EquipmentID
      type: string
      required: true
    - name: EquipmentName
      type: string
      required: true
    - name: Category
      type: string
      required: true
    - name: PurchaseDate
      type: datetime
      required: false
    - name: DailyHireRate
      type: float
      required: true
    - name: Status
      type: string
      required: true

Customer_Master:
  columns:
    - name: CustomerID
      type: string
      required: true
    - name: CustomerName
      type: string
      required: true
    - name: CustomerType
      type: string
      required: false
    - name: AccountManager
      type: string
      required: false

Rental_Transactions:
  columns:
    - name: TransactionID
      type: string
      required: true
    - name: EquipmentID
      type: string
      required: true
    - name: CustomerID
      type: string
      required: true
    - name: StartDate
      type: datetime
      required: true
    - name: EndDate
      type: datetime
      required: false
    - name: RentalDays
      type: int
      required: true
    - name: DailyRate
      type: float
      required: true
    - name: BaseRevenue
      type: float
      required: false
    - name: ActualRevenue
      type: float
      required: false
    - name: Status
      type: string
      required: true

Date_Dimension:
  columns:
    - name: Date
      type: datetime
      required: true
    - name: Year
      type: int
      required: true
    - name: Quarter
      type: int
      required: true
    - name: Month
      type: int
      required: true
    - name: MonthName
      type: string
      required: true
    - name: Week
      type: int
      required: true
    - name: DayOfWeek
      type: int
      required: true
    - name: DayName
      type: string
      required: true
    - name: IsWeekend
      type: int
      required: true
    - name: IsHoliday
      type: int
      required: true